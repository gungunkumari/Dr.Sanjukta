<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor's Portal — Appointments</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #1a2624;
    }

    /* ── Header ── */
    .header {
      background: #2E8B57;
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
    }
    .header p {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 2px;
    }
    .header-logo {
      font-size: 32px;
    }
    .current-time {
      font-size: 13px;
      opacity: 0.85;
      text-align: right;
    }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 20px 32px;
      background: white;
      border-bottom: 1px solid #e0ece5;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #f7fbf8;
      border: 1.5px solid #e0ece5;
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
      min-width: 130px;
    }
    .stat-card .number {
      font-size: 28px;
      font-weight: 700;
      color: #2E8B57;
    }
    .stat-card .label {
      font-size: 12px;
      color: #7a908a;
      margin-top: 4px;
    }
    .stat-card.pending .number  { color: #d97706; }
    .stat-card.confirmed .number { color: #2E8B57; }
    .stat-card.cancelled .number { color: #e53e3e; }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      border: 1.5px solid #e0ece5;
      border-radius: 10px;
      padding: 10px 16px;
      width: 280px;
    }
    .search-box input {
      border: none;
      outline: none;
      font-size: 14px;
      width: 100%;
      font-family: inherit;
      color: #1a2624;
    }
    .filter-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: 1.5px solid #e0ece5;
      background: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: #2E8B57; color: #2E8B57; }
    .filter-btn.active { background: #2E8B57; color: white; border-color: #2E8B57; }
    .refresh-btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      background: #e8f5ee;
      color: #2E8B57;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .refresh-btn:hover { background: #2E8B57; color: white; }

    /* ── Table ── */
    .table-wrap {
      padding: 0 32px 32px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    thead {
      background: #2E8B57;
      color: white;
    }
    th {
      padding: 14px 18px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    td {
      padding: 14px 18px;
      font-size: 14px;
      border-bottom: 1px solid #f0f4f0;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f7fbf8; }

    .patient-name { font-weight: 600; color: #1a2624; }
    .patient-email { font-size: 12px; color: #7a908a; margin-top: 2px; }

    /* ── Status Badge ── */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-Pending   { background: #fef3c7; color: #d97706; }
    .status-Confirmed { background: #e8f5ee; color: #2E8B57; }
    .status-Cancelled { background: #fff5f5; color: #e53e3e; }
    .status-Completed { background: #e0f2fe; color: #0369a1; }

    /* ── Action Buttons ── */
    .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-confirm {
      padding: 5px 12px; border-radius: 6px; border: none;
      background: #e8f5ee; color: #2E8B57;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .btn-confirm:hover { background: #2E8B57; color: white; }
    .btn-cancel {
      padding: 5px 12px; border-radius: 6px; border: none;
      background: #fff5f5; color: #e53e3e;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .btn-cancel:hover { background: #e53e3e; color: white; }
    .btn-complete {
      padding: 5px 12px; border-radius: 6px; border: none;
      background: #e0f2fe; color: #0369a1;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .btn-complete:hover { background: #0369a1; color: white; }
    .btn-delete {
      padding: 5px 10px; border-radius: 6px; border: none;
      background: #f0f4f8; color: #7a908a;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .btn-delete:hover { background: #e53e3e; color: white; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #7a908a;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: #4a5e58; }
    .empty-state p { font-size: 14px; }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 60px;
      color: #7a908a;
      font-size: 16px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a2624;
      color: white;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 1000;
      display: none;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Message column ── */
    .message-text {
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #4a5e58;
      font-size: 13px;
    }

    @media (max-width: 768px) {
      .stats-bar { padding: 16px; }
      .controls  { padding: 16px; }
      .table-wrap { padding: 0 16px 24px; }
      .header { padding: 16px; }
      .search-box { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">🏥</div>
    <div>
      <h1>Doctor's Portal</h1>
      <p>Manage your appointments</p>
    </div>
  </div>
  <div class="current-time" id="currentTime"></div>
</div>

<!-- ── Stats Bar ── -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="number" id="totalCount">0</div>
    <div class="label">Total</div>
  </div>
  <div class="stat-card pending">
    <div class="number" id="pendingCount">0</div>
    <div class="label">Pending</div>
  </div>
  <div class="stat-card confirmed">
    <div class="number" id="confirmedCount">0</div>
    <div class="label">Confirmed</div>
  </div>
  <div class="stat-card">
    <div class="number" id="completedCount">0</div>
    <div class="label">Completed</div>
  </div>
  <div class="stat-card cancelled">
    <div class="number" id="cancelledCount">0</div>
    <div class="label">Cancelled</div>
  </div>
</div>

<!-- ── Controls ── -->
<div class="controls">
  <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
    <div class="search-box">
      🔍 <input type="text" id="searchInput" placeholder="Search by name, email, phone..." oninput="filterAppointments()" />
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
      <button class="filter-btn" onclick="setFilter('Pending', this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('Confirmed', this)">Confirmed</button>
      <button class="filter-btn" onclick="setFilter('Completed', this)">Completed</button>
      <button class="filter-btn" onclick="setFilter('Cancelled', this)">Cancelled</button>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadAppointments()">🔄 Refresh</button>
</div>

<!-- ── Table ── -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Patient</th>
        <th>Phone</th>
        <th>Message</th>
        <th>Date & Time</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="appointmentsBody">
      <tr>
        <td colspan="7">
          <div class="loading">⏳ Loading appointments...</div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>


<script>
  // ── All appointments stored here ──
  let allAppointments = [];
  let currentFilter   = 'All';

  // ── Load appointments from backend ──
  async function loadAppointments() {
    try {
      const response = await fetch('/appointments');
      const data     = await response.json();
      allAppointments = data.appointments;
      updateStats();
      renderTable();
    } catch (err) {
      document.getElementById('appointmentsBody').innerHTML = `
        <tr><td colspan="7">
          <div class="empty-state">
            <div class="icon">❌</div>
            <h3>Cannot connect to server</h3>
            <p>Make sure backend is running: <strong>node server.js</strong></p>
          </div>
        </td></tr>`;
    }
  }

  // ── Update stats numbers ──
  function updateStats() {
    const total     = allAppointments.length;
    const pending   = allAppointments.filter(a => a.status === 'Pending').length;
    const confirmed = allAppointments.filter(a => a.status === 'Confirmed').length;
    const completed = allAppointments.filter(a => a.status === 'Completed').length;
    const cancelled = allAppointments.filter(a => a.status === 'Cancelled').length;

    document.getElementById('totalCount').textContent     = total;
    document.getElementById('pendingCount').textContent   = pending;
    document.getElementById('confirmedCount').textContent = confirmed;
    document.getElementById('completedCount').textContent = completed;
    document.getElementById('cancelledCount').textContent = cancelled;
  }

  // ── Render table ──
  function renderTable() {
    const search  = document.getElementById('searchInput').value.toLowerCase();
    const tbody   = document.getElementById('appointmentsBody');

    let filtered = allAppointments;

    // Filter by status
    if (currentFilter !== 'All') {
      filtered = filtered.filter(a => a.status === currentFilter);
    }

    // Filter by search
    if (search) {
      filtered = filtered.filter(a =>
        a.name.toLowerCase().includes(search)  ||
        a.email.toLowerCase().includes(search) ||
        a.phone.toLowerCase().includes(search)
      );
    }

    if (filtered.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="7">
          <div class="empty-state">
            <div class="icon">📭</div>
            <h3>No appointments found</h3>
            <p>No appointments match your search or filter.</p>
          </div>
        </td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map((a, index) => `
      <tr>
        <td style="color:#7a908a; font-size:13px;">${index + 1}</td>
        <td>
          <div class="patient-name">${a.name}</div>
          <div class="patient-email">${a.email}</div>
        </td>
        <td style="font-size:13px;">${a.phone}</td>
        <td><div class="message-text" title="${a.message}">${a.message}</div></td>
        <td style="font-size:13px; white-space:nowrap;">
          📅 ${a.date}<br>
          <span style="color:#7a908a;">🕐 ${a.time}</span>
        </td>
        <td><span class="status-badge status-${a.status}">${a.status}</span></td>
        <td>
          <div class="action-btns">
            ${a.status !== 'Confirmed'  ? `<button class="btn-confirm"  onclick="updateStatus(${a.id}, 'Confirmed')">✅ Confirm</button>`   : ''}
            ${a.status !== 'Completed'  ? `<button class="btn-complete" onclick="updateStatus(${a.id}, 'Completed')">🏁 Done</button>`       : ''}
            ${a.status !== 'Cancelled'  ? `<button class="btn-cancel"   onclick="updateStatus(${a.id}, 'Cancelled')">❌ Cancel</button>`     : ''}
            <button class="btn-delete" onclick="deleteAppointment(${a.id})">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── Update status ──
  async function updateStatus(id, status) {
    try {
      await fetch(`/appointments/${id}`, {
        method:  'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ status })
      });
      showToast(`✅ Status updated to ${status}`);
      loadAppointments();
    } catch (err) {
      showToast('❌ Failed to update status');
    }
  }

  // ── Delete appointment ──
  async function deleteAppointment(id) {
    if (!confirm('Are you sure you want to delete this appointment?')) return;
    try {
      await fetch(`/appointments/${id}`, { method: 'DELETE' });
      showToast('🗑️ Appointment deleted');
      loadAppointments();
    } catch (err) {
      showToast('❌ Failed to delete');
    }
  }

  // ── Filter by status ──
  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  // ── Search filter ──
  function filterAppointments() { renderTable(); }

  // ── Toast notification ──
  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent  = message;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
  }

  // ── Live clock ──
  function updateClock() {
    const now = new Date();
    document.getElementById('currentTime').innerHTML =
      `📅 ${now.toLocaleDateString('en-IN', { weekday:'long', day:'2-digit', month:'long', year:'numeric' })}<br>
       🕐 ${now.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true })}`;
  }

  // ── Auto refresh every 30 seconds ──
  setInterval(loadAppointments, 30000);
  setInterval(updateClock, 1000);

  // ── Load on page open ──
  loadAppointments();
  updateClock();
</script>

</body>
</html>
